version: '3.8'

services:
  # Frontend Development Server
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: carmen-web-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:5000
    networks:
      - carmen-network
    command: npm run dev -- --host

  # Optional: Nginx for testing production build locally
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carmen-web-prod
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    networks:
      - carmen-network
    profiles:
      - prod

networks:
  carmen-network:
    driver: bridge
